<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful AI - Professional Photo Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #canvas-holder { border: 3px solid #333; border-radius: 10px; background: #222; overflow: hidden; margin: 20px 0; position: relative; }
        .controls { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #007bff; color: white; width: 100%; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
        .btn-ai { background: #6f42c1; }
        .btn-save { background: #28a745; }
        input[type="range"] { width: 100%; cursor: pointer; }
        label { font-size: 13px; color: #aaa; text-align: left; display: block; margin-bottom: 5px; }
        #loading { color: #ffc107; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ariful AI - ফটো ও পোশাক এডিটর</h2>
    <p>ব্রাউজার-বেসড AI (কোনো API Key লাগবে না)</p>
    
    <div id="loading">AI মডেল লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</div>
    
    <input type="file" id="imageInput" accept="image/*" class="btn" style="width: auto;">
    
    <div id="canvas-holder">
        </div>

    <div class="controls">
        <div>
            <label>উজ্জ্বলতা (Brightness)</label>
            <input type="range" id="bright" min="0" max="200" value="100">
        </div>
        <div>
            <label>ব্যাকগ্রাউন্ড পরিবর্তন (Change BG)</label>
            <select id="bgType" class="btn" style="background: #333;">
                <option value="none">স্বাভাবিক (Normal)</option>
                <option value="blur">ঝাপসা (Blur)</option>
                <option value="transparent">ট্রান্সপারেন্ট (Remove BG)</option>
                <option value="black">কালো ব্যাকগ্রাউন্ড</option>
            </select>
        </div>
        <div>
            <label>পোশাকের কালার ফিল্টার</label>
            <input type="color" id="dressColor" value="#ffffff">
        </div>
        <button class="btn btn-save" onclick="savePhoto()">ছবি সেভ করুন</button>
    </div>
</div>

<script>
    let img;
    let bodypix;
    let segmentation;
    let canvas;
    let isModelLoaded = false;

    function setup() {
        let c = createCanvas(500, 600);
        c.parent('canvas-holder');
        bodypix = ml5.bodyPix({
            outputStride: 8,
            segmentationThreshold: 0.5
        }, modelReady);
    }

    function modelReady() {
        document.getElementById('loading').innerText = "AI মডেল তৈরি! ছবি আপলোড দিন।";
        isModelLoaded = true;
    }

    // ছবি আপলোড হ্যান্ডলার
    document.getElementById('imageInput').onchange = (e) => {
        let file = e.target.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = (event) => {
                loadImage(event.target.result, (loadedImg) => {
                    img = loadedImg;
                    img.resize(500, 600);
                    if (isModelLoaded) bodypix.segment(img, gotResults);
                });
            };
            reader.readAsDataURL(file);
        }
    };

    function gotResults(err, result) {
        if (err) return console.log(err);
        segmentation = result;
        draw();
    }

    function draw() {
        if (!img) return;
        background(0);
        
        let bgType = document.getElementById('bgType').value;
        let brightness = document.getElementById('bright').value;
        let dColor = document.getElementById('dressColor').value;

        // ফিল্টার প্রয়োগ
        drawingContext.filter = `brightness(${brightness}%)`;

        if (segmentation && bgType !== 'none') {
            // AI দিয়ে ব্যাকগ্রাউন্ড প্রসেসিং
            if (bgType === 'blur') {
                image(img, 0, 0);
                filter(BLUR, 5);
            }
            
            // শুধু মানুষকে দেখানো (Masking)
            let mask = segmentation.backgroundMask;
            img.mask(mask);
            image(img, 0, 0);
        } else {
            image(img, 0, 0);
        }
    }

    function savePhoto() {
        saveCanvas('ariful-ai-edited', 'png');
    }
</script>

</body>
</html>
