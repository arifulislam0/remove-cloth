<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful AI - Professional Photo Editor</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; }
        .main-container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .sidebar { background: #fafafa; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        h2 { color: #1f2937; margin-top: 0; font-size: 22px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .section-title { font-weight: bold; margin: 15px 0 8px; color: #4b5563; display: block; }
        input[type="file"], input[type="color"], select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        .clothing-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .suit-card { border: 2px solid #eee; border-radius: 8px; cursor: pointer; padding: 5px; transition: 0.3s; background: white; }
        .suit-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .suit-card img { width: 100%; height: auto; border-radius: 5px; }

        .canvas-area { display: flex; flex-direction: column; align-items: center; background: #e5e7eb; border-radius: 10px; padding: 20px; min-height: 500px; justify-content: center; }
        canvas { background: white; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); max-width: 100%; cursor: move; }
        
        .btn-download { background: var(--success); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn-download:hover { background: #047857; }
        
        .slider-box { background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .hint { font-size: 12px; color: #6b7280; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <h2>AI Photo Studio</h2>
        
        <span class="section-title">১. আপনার ছবি দিন</span>
        <input type="file" id="upload" accept="image/*">
        
        <span class="section-title">২. নতুন ব্যাকগ্রাউন্ড কালার</span>
        <input type="color" id="bgPicker" value="#ffffff">

        <span class="section-title">৩. কোট/টাই সিলেক্ট করুন</span>
        <div class="clothing-grid">
            <div class="suit-card" onclick="addSuit('https://i.ibb.co/3WfK4K0/shirt1.png')">
                <img src="https://i.ibb.co/3WfK4K0/shirt1.png" alt="Suit 1">
            </div>
            <div class="suit-card" onclick="addSuit('https://i.postimg.cc/mD8P3m3V/suit2.png')">
                <img src="https://i.postimg.cc/mD8P3m3V/suit2.png" alt="Suit 2">
            </div>
            <div class="suit-card" onclick="addSuit('https://i.postimg.cc/6pXm4V9x/suit3.png')">
                <img src="https://i.postimg.cc/6pXm4V9x/suit3.png" alt="Suit 3">
            </div>
            <div class="suit-card" onclick="addSuit('https://i.postimg.cc/9F73M7S5/suit4.png')">
                <img src="https://i.postimg.cc/9F73M7S5/suit4.png" alt="Suit 4">
            </div>
        </div>

        <div class="slider-box">
            <span class="section-title">পোশাক ছোট-বড় করুন</span>
            <input type="range" id="sizeSlider" min="0.2" max="2.5" step="0.01" value="1">
            <p class="hint">মাউস দিয়ে টেনে পোশাকটি ছবির গলার সাথে ঠিকমতো বসান।</p>
        </div>

        <button class="btn-download" onclick="download()">ফাইনাল ছবি ডাউনলোড</button>
    </div>

    <div class="canvas-area">
        <canvas id="canvas"></canvas>
        <p class="hint">ছবি লোড হওয়ার পর পোশাকটি ড্র্যাগ করে পজিশন করুন।</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const bgPicker = document.getElementById('bgPicker');
    const sizeSlider = document.getElementById('sizeSlider');

    let userImg = null;
    let suitImg = null;
    let suitX = 50, suitY = 150, suitScale = 1;
    let dragging = false;
    let offsetX, offsetY;

    canvas.width = 500;
    canvas.height = 600;

    // ১. ছবি আপলোড ও ব্যাকগ্রাউন্ড রিমুভ ট্রিক
    upload.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            userImg = new Image();
            userImg.onload = () => draw();
            userImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // ২. পোশাক যোগ করা
    function addSuit(url) {
        suitImg = new Image();
        suitImg.crossOrigin = "anonymous";
        suitImg.onload = () => {
            suitX = (canvas.width - (suitImg.width * 0.5)) / 2;
            suitY = 200;
            draw();
        };
        suitImg.src = url;
    }

    // ৩. ড্রয়িং ফাংশন
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // ব্যাকগ্রাউন্ড কালার
        ctx.fillStyle = bgPicker.value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (userImg) {
            // ছবির সাইজ ঠিক করা
            let ratio = Math.min(canvas.width / userImg.width, canvas.height / userImg.height);
            let w = userImg.width * ratio;
            let h = userImg.height * ratio;
            ctx.drawImage(userImg, (canvas.width-w)/2, (canvas.height-h)/2, w, h);
        }

        if (suitImg) {
            let sw = suitImg.width * suitScale * 0.5;
            let sh = suitImg.height * suitScale * 0.5;
            ctx.drawImage(suitImg, suitX, suitY, sw, sh);
        }
    }

    // ৪. ড্র্যাগিং লজিক
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        if (suitImg) {
            dragging = true;
            offsetX = mx - suitX;
            offsetY = my - suitY;
        }
    };

    window.onmousemove = (e) => {
        if (dragging) {
            const rect = canvas.getBoundingClientRect();
            suitX = e.clientX - rect.left - offsetX;
            suitY = e.clientY - rect.top - offsetY;
            draw();
        }
    };

    window.onmouseup = () => dragging = false;

    sizeSlider.oninput = (e) => {
        suitScale = e.target.value;
        draw();
    };

    bgPicker.oninput = () => draw();

    function download() {
        const link = document.createElement('a');
        link.download = 'ariful-editor-photo.jpg';
        link.href = canvas.toDataURL('image/jpeg', 1.0);
        link.click();
    }
</script>

</body>
</html>
