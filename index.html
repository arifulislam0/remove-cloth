<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful AI Photo Editor (Online Mode)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .editor-card { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #preview-canvas { max-width: 100%; border: 2px dashed #ccc; border-radius: 10px; margin-top: 20px; }
        .btn-group { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .upload-btn { background: #007bff; color: white; }
        .ai-btn { background: #6f42c1; color: white; }
        .save-btn { background: #28a745; color: white; }
        #status { margin-top: 10px; color: #555; font-style: italic; }
    </style>
</head>
<body>

<div class="editor-card">
    <h2>Ariful AI - ব্যাকগ্রাউন্ড রিমুভার</h2>
    <p>এই টুলটি ব্যবহারের জন্য ইন্টারনেট কানেকশন প্রয়োজন।</p>
    
    <input type="file" id="imageInput" accept="image/*" hidden>
    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">ছবি আপলোড করুন</button>
    
    <div id="status">কোনো ছবি সিলেক্ট করা হয়নি</div>
    <canvas id="preview-canvas"></canvas>

    <div class="btn-group">
        <button class="ai-btn" onclick="processAI()">AI দিয়ে ব্যাকগ্রাউন্ড সরান</button>
        <button class="save-btn" onclick="downloadResult()">ছবি সেভ করুন</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    let originalImage = null;

    // ১. ছবি লোড করা
    document.getElementById('imageInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            originalImage = new Image();
            originalImage.onload = function() {
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                ctx.drawImage(originalImage, 0, 0);
                status.innerText = "ছবি লোড হয়েছে। এবার AI বাটনে ক্লিক করুন।";
            }
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // ২. AI (Remove.bg API) এর মাধ্যমে ব্যাকগ্রাউন্ড সরানো
    async function processAI() {
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) return alert("আগে একটি ছবি আপলোড করুন!");

        status.innerText = "AI প্রসেসিং চলছে... দয়া করে অপেক্ষা করুন (ইন্টারনেট চেক করুন)";

        const formData = new FormData();
        formData.append('image_file', fileInput.files[0]);
        formData.append('size', 'auto');

        // *** এখানে আপনার নিজের API Key বসান ***
        const apiKey = 'YOUR_API_KEY_HERE'; 

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': apiKey },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const resultImg = new Image();
                resultImg.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(resultImg, 0, 0);
                    status.innerText = "ব্যাকগ্রাউন্ড সফলভাবে সরানো হয়েছে!";
                };
                resultImg.src = url;
            } else {
                status.innerText = "Error: API লিমিট শেষ বা ভুল কি (Key) দিয়েছেন।";
            }
        } catch (error) {
            status.innerText = "ইন্টারনেট কানেকশন চেক করুন।";
        }
    }

    // ৩. ছবি ডাউনলোড
    function downloadResult() {
        const link = document.createElement('a');
        link.download = 'ariful-ai-result.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
