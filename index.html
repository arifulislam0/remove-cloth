<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARIFUL UNIVERSAL MRZ GENERATOR</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #2c3e50; }
        
        /* প্রিমিয়াম টাইটেল স্টাইল */
        .premium-title { text-align: center; color: #2c3e50; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; border-bottom: 3px solid #e74c3c; display: inline-block; width: 100%; padding-bottom: 10px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #bdc3c7; border-radius: 6px; }
        
        /* রেজাল্ট বক্স বড় এবং পরিষ্কার */
        #result { width: 100%; height: 140px; background: #000; color: #00ff00; font-family: 'Courier New', monospace; font-size: 24px; padding: 20px; border-radius: 8px; resize: none; box-sizing: border-box; font-weight: bold; }
        
        .btn-copy { width: 100%; padding: 20px; background: linear-gradient(to right, #2c3e50, #27ae60); color: white; border: none; cursor: pointer; font-size: 20px; font-weight: bold; border-radius: 6px; margin-top: 15px; transition: 0.3s; }
        .btn-copy:hover { opacity: 0.9; }
        
        .footer { text-align: center; margin-top: 30px; font-size: 16px; color: #34495e; font-weight: bold; padding: 10px; background: #ecf0f1; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="premium-title">ARIFUL UNIVERSAL MRZ GENERATOR</h2>
    
    <div class="grid-container">
        <div><label>DOC TYPE</label><select id="docType" oninput="generateMRZ()"><option value="P">P</option></select></div>
        <div><label>COUNTRY</label><input type="text" id="country" value="JPN" oninput="generateMRZ()"></div>
        <div><label>PASSPORT NO</label><input type="text" id="passport" oninput="generateMRZ()"></div>
        <div><label>SURNAME</label><input type="text" id="surname" oninput="generateMRZ()"></div>
        <div><label>GIVEN NAMES</label><input type="text" id="givenNames" oninput="generateMRZ()"></div>
        <div><label>GENDER</label><select id="gender" oninput="generateMRZ()"><option value="M">Male</option><option value="F">Female</option></select></div>
        <div><label>DOB (YYMMDD)</label><input type="text" id="dob" oninput="generateMRZ()"></div>
        <div><label>EXPIRY (YYMMDD)</label><input type="text" id="expiry" oninput="generateMRZ()"></div>
    </div>

    <textarea id="result" readonly></textarea>
    <button class="btn-copy" onclick="copyResult()">COPY RESULT</button>
    
    <div class="footer">
        Developed By: Ariful | WhatsApp: +8801981071493 | Official Support: +8801981071493
    </div>
</div>

<script>
    function getCheckDigit(str) {
        let weights = [7, 3, 1];
        let sum = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            let val = (char === '<') ? 0 : parseInt(char, 36);
            sum += val * weights[i % 3];
        }
        return sum % 10;
    }

    function generateMRZ() {
        const type = document.getElementById('docType').value;
        const country = document.getElementById('country').value.toUpperCase().padEnd(3, '<');
        const pass = document.getElementById('passport').value.toUpperCase();
        const sur = document.getElementById('surname').value.toUpperCase().replace(/\s+/g, '<');
        const giv = document.getElementById('givenNames').value.toUpperCase().replace(/\s+/g, '<');
        const gen = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value;
        const exp = document.getElementById('expiry').value;

        let line1 = (type + "<" + country + sur + "<<" + giv).padEnd(44, '<');
        
        const pCheck = getCheckDigit(pass);
        const dCheck = getCheckDigit(dob);
        const eCheck = getCheckDigit(exp);
        
        let line2Base = pass + pCheck + country.substring(0,3) + dob + dCheck + gen + exp + eCheck;
        let finalLine2Part = line2Base.padEnd(43, '<');
        let compositeCheck = getCheckDigit(finalLine2Part);
        
        document.getElementById('result').value = line1 + "\n" + finalLine2Part + compositeCheck;
    }

    function copyResult() {
        const copyText = document.getElementById("result");
        copyText.select();
        document.execCommand("copy");
        alert("Copied to clipboard!");
    }
</script>
</body>
</html>
